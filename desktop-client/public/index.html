<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3b82f6" />
    <meta
      name="description"
      content="AppManager Desktop Client - Automated Software Installation"
    />
    <title>DeployGen - Automated Software Installation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #3b82f6;
        --primary-dark: #1e40af;
        --secondary: #1e293b;
        --accent: #06b6d4;
        --white: #ffffff;
        --dark: #0f172a;
        --glass-light: rgba(255, 255, 255, 0.25);
        --glass-dark: rgba(0, 0, 0, 0.25);
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 25%, #f0fdfa 75%, #f5f3ff 100%);
        background-attachment: fixed;
        color: var(--secondary);
        overflow: hidden;
      }

      /* Animated background overlay */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: 
          radial-gradient(600px at 20% 40%, rgba(59, 130, 246, 0.15) 0%, transparent 80%),
          radial-gradient(500px at 80% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 80%);
        pointer-events: none;
        z-index: 0;
      }

      #root {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
      }

      /* Glass effect base styles */
      .glass {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 12px;
      }

      .glass-light {
        background: rgba(255, 255, 255, 0.4);
      }

      .glass-dark {
        background: rgba(0, 0, 0, 0.1);
      }

      /* Smooth scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(59, 130, 246, 0.5);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(59, 130, 246, 0.7);
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes glow {
        0%, 100% {
          box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        50% {
          box-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
        }
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .animate-fadeIn {
        animation: fadeIn 0.5s ease-out;
      }

      .animate-slideInRight {
        animation: slideInRight 0.5s ease-out;
      }

      .animate-glow {
        animation: glow 2s ease-in-out infinite;
      }

      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

      /* Loading spinner */
      .spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(59, 130, 246, 0.3);
        border-radius: 50%;
        border-top-color: var(--primary);
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
